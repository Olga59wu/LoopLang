<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>泰語單字清單 - LoopLang</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f8fafc">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .thai-text { font-family: 'Sarabun', sans-serif; }
    [v-cloak] { display: none; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-[100dvh] flex flex-col items-center selection:bg-indigo-100 pb-20">
  <div id="app" class="w-full max-w-md w-full" v-cloak>
    
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-slate-50/90 backdrop-blur-md pt-8 pb-4 px-6 border-b border-slate-200 shadow-sm flex flex-col gap-4">
      <div class="flex items-center">
        <a href="/thai_drill.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-slate-500 hover:text-slate-900 transition-transform active:scale-95 mr-4" aria-label="返回練習">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h1 class="text-xl font-bold tracking-tight">Thai <span class="text-slate-400 font-medium">單字清單</span></h1>
      </div>
      
      <!-- Search -->
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
        <input 
          type="text" 
          v-model="searchQuery" 
          class="w-full bg-white border border-slate-200 text-slate-800 text-sm rounded-2xl focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 block pl-11 p-3.5 transition-all outline-none placeholder:text-slate-400 font-medium shadow-sm" 
          placeholder="搜尋泰文或中文..."
        >
        <button v-show="searchQuery" @click="searchQuery = ''" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div class="flex justify-between items-center px-1">
        <span class="text-[11px] font-bold tracking-widest text-slate-400 uppercase">總計 {{ filteredCards.length }} 句</span>
        <button @click="showExport" class="flex items-center gap-1.5 text-[11px] font-bold tracking-widest text-indigo-500 hover:text-indigo-600 transition-colors uppercase hit-area">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          匯出文字
        </button>
      </div>
    </header>

    <!-- Loading -->
    <div v-if="isLoading" class="flex flex-col items-center justify-center mt-20 text-slate-400">
      <div class="w-8 h-8 border-4 border-slate-200 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
      <p class="text-sm font-bold tracking-wide">載入資料庫中...</p>
    </div>

    <!-- Empty State -->
    <div v-else-if="filteredCards.length === 0" class="flex flex-col items-center justify-center mt-20 text-slate-400">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4 text-slate-300"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <p class="text-sm font-medium">找不到符合的句子</p>
    </div>

    <!-- Card List -->
    <div v-else class="flex flex-col gap-3 px-6 pt-6">
      <div 
        v-for="card in filteredCards" 
        :key="card.id"
        class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-2 relative transition-all hover:shadow-md"
      >
        <!-- Delete Button -->
        <button 
          @click.stop="deleteCard(card.id)"
          class="absolute top-3 right-3 p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors focus:outline-none" 
          aria-label="刪除" title="刪除此句"
        >
          <svg v-if="deletingId === card.id" class="animate-spin h-5 w-5 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <svg v-else xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
        </button>

        <!-- Thai Text -->
        <div class="thai-text text-2xl font-bold tracking-tight break-keep pr-8 cursor-pointer" @click="playAudio(card)">
          <span 
            v-for="(syllable, i) in getRenderArray(card.text)" 
            :key="i"
            :class="getColorClass(card.tone_classes?.[i])"
          >{{ syllable }}</span>
        </div>
        
        <!-- Translation -->
        <div class="text-sm text-slate-500 font-medium mt-1 pr-8">
          {{ card.translation }}
        </div>
        
        <!-- Audio Indicator -->
        <div v-if="card.audio_url" class="absolute bottom-4 right-4 text-indigo-400">
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        </div>
      </div>
    </div>

    <!-- Export Modal -->
    <div v-if="isExportModalOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity">
      <div class="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[85vh]">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
          <h2 class="text-lg font-bold text-slate-800 tracking-tight">匯出文字內容</h2>
          <button @click="isExportModalOpen = false" class="text-slate-400 hover:text-slate-600 transition-colors p-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <div class="p-6 overflow-y-auto flex-1">
          <textarea 
            readonly 
            v-model="exportText" 
            class="w-full h-64 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 resize-none"
          ></textarea>
        </div>
        <div class="px-6 py-4 border-t border-slate-100 bg-slate-50">
          <button @click="copyText" class="w-full py-3.5 rounded-2xl bg-slate-800 text-white font-bold tracking-wide hover:bg-slate-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-md shadow-slate-200">
            <svg v-if="copySuccess" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <svg v-else xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            {{ copySuccess ? '已複製！' : '複製全部內容' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createApp, ref, computed, onMounted } from 'vue';
    import { FirebaseService } from './js/firebase-service.js';
    import { collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const App = {
      setup() {
        const cards = ref([]);
        const searchQuery = ref('');
        const isLoading = ref(true);
        const deletingId = ref(null);
        
        // Export states
        const isExportModalOpen = ref(false);
        const exportText = ref('');
        const copySuccess = ref(false);
        
        let currentAudio = null;

        const colorMap = {
          mid: 'text-emerald-500',
          low: 'text-sky-500',
          falling: 'text-amber-500',
          high: 'text-rose-500',
          rising: 'text-purple-500'
        };

        const resolveAudioUrl = (path) => {
          if (!path) return null;
          if (path.startsWith('http://') || path.startsWith('https://')) return path;
          let cleanPath = path.startsWith('/') ? path.substring(1) : path;
          const encodedPath = cleanPath.split('/').map(encodeURIComponent).join('%2F');
          const bucketName = 'looplang-6ef14.firebasestorage.app';
          return `https://firebasestorage.googleapis.com/v0/b/${bucketName}/o/${encodedPath}?alt=media`;
        };

        const loadData = async () => {
          isLoading.value = true;
          try {
            const phrasesRef = collection(FirebaseService.db, "thai_phrases");
            const snap = await getDocs(phrasesRef);
            const loaded = [];
            snap.forEach(docSnap => {
              loaded.push({ id: docSnap.id, ...docSnap.data() });
            });
            // Sort newest first or random, let's keep original insertion order or reverse it
            cards.value = loaded.reverse();
          } catch (e) {
            console.error("載入失敗", e);
          } finally {
            isLoading.value = false;
          }
        };

        onMounted(() => {
          const auth = getAuth(FirebaseService.app);
          onAuthStateChanged(auth, (user) => {
            if (user) {
              loadData();
            } else {
              isLoading.value = false;
              alert("請先登入！");
              window.location.href = '/thai_drill.html';
            }
          });
        });

        const filteredCards = computed(() => {
          if (!searchQuery.value.trim()) return cards.value;
          const q = searchQuery.value.toLowerCase().trim();
          return cards.value.filter(c => {
            const textStr = Array.isArray(c.text) ? c.text.join('') : (c.text || '');
            return textStr.includes(q) || (c.translation && c.translation.toLowerCase().includes(q));
          });
        });

        const getRenderArray = (textData) => {
          if (Array.isArray(textData)) return textData;
          return [textData || ''];
        };

        const getColorClass = (toneClass) => {
          return colorMap[toneClass] || 'text-slate-800';
        };

        const playAudio = (card) => {
          if (card.audio_url) {
            if (currentAudio) {
              currentAudio.pause();
              currentAudio.currentTime = 0;
            }
            currentAudio = new Audio(resolveAudioUrl(card.audio_url));
            currentAudio.play().catch(e => console.error("Audio play failed:", e));
          } else if (card.text) {
            const fullText = Array.isArray(card.text) ? card.text.join("") : card.text;
            const utterance = new SpeechSynthesisUtterance(fullText);
            utterance.lang = 'th-TH';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        const deleteCard = async (id) => {
          const confirmDelete = confirm("確定要刪除這張卡片嗎？此動作無法復原。");
          if (!confirmDelete) return;

          try {
            deletingId.value = id;
            await deleteDoc(doc(FirebaseService.db, "thai_phrases", id));
            cards.value = cards.value.filter(c => c.id !== id);
          } catch (e) {
            console.error(e);
            alert("刪除失敗: " + e.message);
          } finally {
            deletingId.value = null;
          }
        };

        const showExport = () => {
          if (filteredCards.value.length === 0) return;
          
          let content = "";
          filteredCards.value.forEach(card => {
            const thaiText = Array.isArray(card.text) ? card.text.join("") : card.text;
            const translation = card.translation || "";
            content += `${thaiText}\t${translation}\n`;
          });
          
          exportText.value = content.trim();
          isExportModalOpen.value = true;
          copySuccess.value = false;
        };

        const copyText = async () => {
          try {
            await navigator.clipboard.writeText(exportText.value);
            copySuccess.value = true;
            setTimeout(() => {
              copySuccess.value = false;
            }, 2000);
          } catch (err) {
            console.error('Failed to copy text: ', err);
            alert('複製失敗，請手動複製文字。');
          }
        };

        return {
          cards, searchQuery, filteredCards, isLoading, deletingId,
          isExportModalOpen, exportText, copySuccess,
          getRenderArray, getColorClass, playAudio, deleteCard, showExport, copyText
        };
      }
    };

    createApp(App).mount('#app');
  </script>
</body>
</html>
