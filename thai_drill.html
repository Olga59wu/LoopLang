<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>泰語聲調訓練 - LoopLang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .thai-text { font-family: 'Sarabun', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-[100dvh] flex flex-col items-center selection:bg-indigo-100">
  
  <!-- Loading or Auth Gate -->
  <div id="loading" class="fixed inset-0 bg-slate-50 flex items-center justify-center z-50 transition-opacity duration-300">
    <div class="animate-pulse text-slate-400 font-bold tracking-widest text-sm">LOADING...</div>
  </div>

  <!-- Header / Navigation -->
  <header class="w-full max-w-md mx-auto p-6 flex justify-between items-center shrink-0">
    <a href="/index.html" class="text-zinc-400 hover:text-zinc-900 transition-colors p-2 -ml-2" aria-label="返回首頁">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="flex flex-col items-center select-none">
      <h1 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Thai Tone Drill</h1>
      <span id="card-counter" class="text-[10px] font-bold text-slate-300 mt-0.5 tracking-wider"></span>
    </div>
      <div class="flex items-center gap-3">
        <a href="/thai_rules.html" class="w-10 h-10 flex items-center justify-center rounded-full glass-panel text-slate-400 hover:text-indigo-500 hover:bg-slate-100 transition-colors shadow-sm" title="聲調規則管理">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </a>
        
        <a href="/thai_list.html" class="w-10 h-10 flex items-center justify-center rounded-full glass-panel text-slate-400 hover:text-indigo-500 hover:bg-slate-100 transition-colors shadow-sm" title="單字清單">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        </a>
        
        <button id="btn-open-add" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-white hover:bg-slate-700 transition-colors shadow-md shadow-slate-200" title="新增卡片">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
  </header>

  <!-- Main Content Area -->
  <main class="w-full max-w-md px-6 flex-1 flex flex-col items-center justify-start pb-6">
    
    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center text-slate-400">
      <p class="text-2xl mb-3">🎉</p>
      <p class="text-lg font-medium text-slate-600 mb-1">今日複習完畢！</p>
      <p class="text-sm">目前沒有需要複習的卡片，太棒了。</p>
    </div>

    <!-- Active Card -->
    <div id="active-card" class="hidden w-full flex-1 flex flex-col relative">
      
      <!-- Delete Button -->
      <button id="btn-delete" class="absolute -top-2 right-0 p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors focus:outline-none z-10" aria-label="刪除卡片" title="刪除這張卡片">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
      </button>
      
      <!-- Navigation & Play Audio Row -->
      <div class="flex items-center justify-center gap-6 mb-4 w-full shrink-0">
        <button id="btn-prev" class="p-3 rounded-full text-slate-300 hover:text-slate-600 hover:bg-slate-100 transition-colors focus:outline-none active:scale-95 disabled:opacity-30 disabled:pointer-events-none" aria-label="上一張">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <button id="play-btn" class="p-4 rounded-full bg-slate-100 text-slate-400 hover:text-slate-700 hover:bg-slate-200 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-300 active:scale-95 flex items-center justify-center" aria-label="播放音檔">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="translate-x-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>

        <button id="btn-next" class="p-3 rounded-full text-slate-300 hover:text-slate-600 hover:bg-slate-100 transition-colors focus:outline-none active:scale-95 disabled:opacity-30 disabled:pointer-events-none" aria-label="下一張">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <!-- Center Content Area (Flex-1) -->
      <div class="flex-1 w-full flex flex-col justify-center items-center py-4 min-h-0 overflow-y-auto">
        <!-- Thai Text Container -->
        <div id="thai-text-container" class="thai-text font-bold tracking-tight mb-6 text-center break-keep w-full transition-all duration-300">
          <!-- 渲染的音節將插入此處 -->
        </div>
        
        <!-- Translation -->
        <div id="translation" class="text-lg text-slate-500 font-medium transition-opacity duration-300 min-h-[30px] opacity-0 text-center">
          <!-- 翻譯將插入此處 -->
        </div>
      </div>

      <!-- Bottom Controls -->
      <div class="w-full shrink-0 pt-4">
        <!-- Action Buttons -->
        <div id="action-buttons" class="hidden w-full grid grid-cols-3 gap-3">
          <button id="btn-forgot" class="py-4 rounded-xl font-semibold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 active:scale-95 transition-all">忘記<br><span class="text-xs font-normal opacity-70">1 天</span></button>
          <button id="btn-hard" class="py-4 rounded-xl font-semibold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 active:scale-95 transition-all">模糊<br><span class="text-xs font-normal opacity-70">+1 天</span></button>
          <button id="btn-remember" class="py-4 rounded-xl font-semibold text-sm bg-slate-900 text-white hover:bg-slate-800 active:scale-95 transition-all">記得<br><span class="text-xs font-normal opacity-70" id="remember-text">x2</span></button>
        </div>

        <!-- Show Answer Button -->
        <button id="btn-show" class="w-full py-4 rounded-xl font-semibold text-sm bg-indigo-50 text-indigo-600 hover:bg-indigo-100 active:scale-95 transition-all">顯示答案</button>
      </div>
    </div>
    
    <!-- Auto Play Controls -->
    <div class="w-full mt-4">
      <div id="autoplay-controls" class="w-full flex flex-col items-center gap-3 border-t border-slate-200 pt-6">
        <p class="text-xs font-bold text-slate-400 tracking-widest uppercase flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
          連續播放模式
        </p>
        <div class="grid grid-cols-2 gap-3 w-full">
          <button id="btn-play-all" class="py-3 rounded-xl font-bold text-sm bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-indigo-600 transition-colors shadow-sm">播放全部 (All)</button>
          <button id="btn-play-due" class="py-3 rounded-xl font-bold text-sm bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-indigo-600 transition-colors shadow-sm">待複習 (Due)</button>
        </div>
      </div>

      <!-- Auto Play Active State -->
      <div id="autoplay-active" class="hidden w-full flex flex-col items-center gap-3 border-t border-slate-100 pt-6">
        <p class="text-xs font-bold text-indigo-500 tracking-widest uppercase flex items-center gap-2 animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          連續播放中...
        </p>
        <button id="btn-stop-autoplay" class="w-full py-4 rounded-xl font-bold text-sm bg-rose-500 text-white hover:bg-rose-600 shadow-md shadow-rose-200 transition-colors flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
          停止播放
        </button>
      </div>
    </div>

    <!-- Add Card Modal -->
    <div id="add-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex flex-col justify-end md:justify-center hidden">
      <div class="bg-white w-full max-w-md mx-auto rounded-t-3xl md:rounded-3xl p-6 shadow-2xl flex flex-col gap-5 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-2">
          <h2 class="text-lg font-bold text-slate-800">新增泰文卡片</h2>
          <button id="btn-close-add" class="text-slate-400 hover:text-slate-700 p-2 -mr-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">泰文單字/句子</label>
          <input type="text" id="add-thai-text" placeholder="請以空格分隔音節，例如: คิด ถึง นะ" class="thai-text w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
        </div>
        
        <div id="tone-selectors-container" class="hidden">
          <label class="block text-xs font-semibold text-slate-500 mb-2">請選擇對應聲調</label>
          <div id="tone-selectors" class="flex flex-col gap-2"></div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">中文翻譯</label>
          <input type="text" id="add-translation" placeholder="例如: 想念你喔" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
        </div>
        
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">音檔網址 (選填)</label>
          <input type="text" id="add-audio-url" placeholder="https://..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
        </div>

        <button id="btn-submit-add" class="w-full py-3.5 mt-2 rounded-xl font-bold text-sm bg-slate-900 text-white hover:bg-slate-800 active:scale-95 transition-all flex justify-center items-center gap-2">
          <span>儲存卡片</span>
        </button>
      </div>
    </div>
  </main>


  <script type="module" src="/js/thai-logic.js?v=4"></script>
</body>
</html>
